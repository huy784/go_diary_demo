# GitHub Actions CD 工作流配置
# 用于自动部署应用到服务器

name: Deploy

# 触发条件：推送代码到 main 或 master 分支
# 只有推送代码时才触发部署，不在 PR 时触发
on:
  push:
    branches: [ main, master ]

# 环境变量配置
env:
  # Docker 镜像名称（需要根据实际情况修改）
  IMAGE_NAME: your-dockerhub-username/go-diary-core
  # Docker 镜像标签
  IMAGE_TAG: latest

jobs:
  # 部署阶段
  deploy:
    runs-on: ubuntu-latest
    # 只有 main 分支推送时才执行部署
    if: github.ref == 'refs/heads/main'
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx（用于多平台构建）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录到 Docker Hub
      # 需要在 GitHub Secrets 中配置 DOCKER_HUB_USERNAME 和 DOCKER_HUB_TOKEN
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 4. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core_run/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. 部署到服务器（模拟）
      # 实际部署时需要配置服务器连接信息
      # 需要在 GitHub Secrets 中配置：
      # - SERVER_HOST: 服务器 IP 或域名
      # - SERVER_USER: 服务器用户名
      # - SERVER_SSH_KEY: SSH 私钥
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 部署脚本
          script: |
            # 停止旧容器
            echo "Stopping old container..."
            docker stop go-diary-core || true
            docker rm go-diary-core || true
            
            # 拉取最新镜像
            echo "Pulling latest image..."
            docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            
            # 启动新容器
            echo "Starting new container..."
            docker run -d \
              --name go-diary-core \
              --network go-diary_go-diary-network \
              -p 8080:8080 \
              -e PORT=8080 \
              -e DB_HOST=postgres \
              -e DB_PORT=5432 \
              -e DB_USER=postgres \
              -e DB_PASS=postgres \
              -e DB_NAME=diarydb \
              ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            
            echo "Deployment completed!"

      # 6. 部署后健康检查
      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 10
          echo "Checking service health..."
          curl -f http://localhost:8080/admin1/api/v1/diaries || echo "Health check failed"
          echo "Deployment successful!"

  # 部署失败通知（可选）
  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "Deployment failed! Please check the logs."
          # 可以集成 Slack、Email 等通知方式
